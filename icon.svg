<svg width="128" height="128" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff00ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#9146ff;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Main circle background -->
  <circle cx="64" cy="64" r="60" fill="url(#grad1)"/>
  
  <!-- Brain/AI symbol -->
  <g transform="translate(32, 32)">
    <!-- Lightning bolt for "cheat" -->
    <path d="M 40 10 L 25 35 L 35 35 L 24 58 L 48 28 L 38 28 L 50 10 Z" 
          fill="#00ff00" stroke="#004400" stroke-width="2"/>
  </g>
  
  <!-- "AI" text -->
  <text x="64" y="100" font-family="Arial, sans-serif" font-size="24" 
        font-weight="bold" fill="#00ff00" text-anchor="middle">AI</text>
</svg>
